name: ASRS — Signal 09:15 CET

on:
  schedule:
    - cron: '20 7 * * 1-5'   # 07:20 UTC = 09:20 CEST (heure d'été)
    - cron: '20 8 * * 1-5'   # 08:20 UTC = 09:20 CET  (heure d'hiver)
  workflow_dispatch:           # déclenchement manuel pour tester

jobs:
  signal:
    name: Check signal & place orders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run ASRS signal
        run: uv run python scripts/asrs_signal.py ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
        env:
          CAPITAL_API_KEY:    ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD:   ${{ secrets.CAPITAL_PASSWORD }}
