name: ASRS — Monitor TP 09:20-17:20 CET

on:
  schedule:
    - cron: '20,30,40,50 7 * * 1-5'   # 07:20-07:50 UTC (couvre 09:20-09:50 CEST)
    - cron: '0,10,20,30,40,50 8-14 * * 1-5'  # 08:00-14:50 UTC
    - cron: '0,10,20 15 * * 1-5'      # 15:00-15:20 UTC (couvre jusqu'à 17:20 CEST)
    - cron: '20,30,40,50 8 * * 1-5'   # hiver : 08:20-08:50 UTC
    - cron: '0,10,20,30,40,50 9-15 * * 1-5'  # hiver : 09:00-15:50 UTC
    - cron: '0,10,20 16 * * 1-5'      # hiver : 16:00-16:20 UTC
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'TP test 1 pt (pour vérifier update_position)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  monitor:
    name: Add TP to open positions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run ASRS monitor
        run: |
          FLAG=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then FLAG="--test"; fi
          uv run python scripts/asrs_monitor.py $FLAG
        env:
          CAPITAL_API_KEY:    ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD:   ${{ secrets.CAPITAL_PASSWORD }}
