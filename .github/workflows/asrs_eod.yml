name: ASRS — EOD Close 17:30 CET

on:
  schedule:
    - cron: '35 15 * * 1-5'  # 15:35 UTC = 17:35 CEST (heure d'été)
    - cron: '35 16 * * 1-5'  # 16:35 UTC = 17:35 CET  (heure d'hiver)
  workflow_dispatch:           # déclenchement manuel pour tester

jobs:
  eod:
    name: Cancel orders & close position
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run ASRS EOD
        run: uv run python scripts/asrs_eod.py
        env:
          CAPITAL_API_KEY:    ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD:   ${{ secrets.CAPITAL_PASSWORD }}
